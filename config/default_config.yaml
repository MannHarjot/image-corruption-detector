# Image Corruption Detector — Default Configuration
# All hyperparameters and paths are centralized here.

model:
  architecture: resnet18
  num_classes: 7
  freeze_backbone: true      # Freeze conv1, layer1, layer2; fine-tune layer3, layer4
  dropout: 0.3
  hidden_dim: 256

training:
  epochs: 25
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 1.0e-4
  patience: 5                # Early stopping patience (epochs with no val loss improvement)
  grad_clip: 1.0             # Max gradient norm for clipping
  lr_factor: 0.5             # ReduceLROnPlateau factor
  lr_patience: 3             # ReduceLROnPlateau patience
  lr_min: 1.0e-6             # Minimum learning rate
  num_workers: 4             # DataLoader worker threads
  pin_memory: true

data:
  image_size: 224            # Resize target (ResNet-18 expects 224x224)
  train_split: 0.70
  val_split: 0.15
  # test_split is implicitly 1 - train_split - val_split = 0.15
  corruption_types:
    - clean
    - gaussian_blur
    - gaussian_noise
    - salt_pepper
    - jpeg_artifacts
    - brightness
    - contrast
  severities: [1, 2, 3]
  samples_per_class: 1000    # Number of base CIFAR-10 images per class (before corruption)
  normalize_mean: [0.485, 0.456, 0.406]   # ImageNet mean
  normalize_std: [0.229, 0.224, 0.225]    # ImageNet std

paths:
  data_dir: data
  output_dir: outputs
  checkpoint_dir: checkpoints
  log_dir: outputs/logs
